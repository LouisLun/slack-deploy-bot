name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Syntax check
        run: |
          node --check src/index.js
          node --check src/routes/slack.js
          node --check src/routes/auth.js
          node --check src/handlers/deploy.js
          node --check src/handlers/hotfix.js
          node --check src/handlers/deployConfig.js
          node --check src/services/github.js
          node --check src/services/config.js
          node --check src/services/slack.js
          node --check src/services/oauthState.js
          node --check src/middleware/verifySlack.js

      - name: Audit
        run: npm audit --audit-level=high
