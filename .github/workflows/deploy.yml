name: Deploy to Cloud Run

on:
  workflow_dispatch:

env:
  # Full Artifact Registry image path:
  # <region>-docker.pkg.dev/<project>/<repository>/slack-deploy-bot
  IMAGE: ${{ vars.AR_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/${{ vars.AR_REPOSITORY }}/slack-deploy-bot

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.AR_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ vars.AR_REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: --timeout=3600
          env_vars: |
            GCS_BUCKET_NAME=${{ vars.GCS_BUCKET_NAME }}
            GCS_CONFIG_FILE_PATH=${{ vars.GCS_CONFIG_FILE_PATH }}
          secrets: |
            SLACK_SIGNING_SECRET=SLACK_SIGNING_SECRET:latest
            SLACK_BOT_TOKEN=SLACK_BOT_TOKEN:latest
            GITHUB_CLIENT_ID=GITHUB_CLIENT_ID:latest
            GITHUB_CLIENT_SECRET=GITHUB_CLIENT_SECRET:latest
